# Ultralytics YOLO26-Pose - Football Pitch Keypoint Dataset (26-point unified)
#
# Generated by merging:
#   - football pitch keypoints.v5i.yolov8  (250 images, native 26-point)
#   - Football Pitch Keypoints.v15i.yolov8 (1181 images, converted from 48-point)
#
# Run training/scripts/convert_v15i_to_26pt.py then merge_datasets.py first.

path: ../datasets/pitch_keypoints_26pt
train: images/train
val:   images/val
test:  images/test

kpt_shape: [26, 3]  # [num_keypoints, dim (x, y, visibility)]

# Horizontal flip symmetry mapping.
# flip_idx[i] = j means: when image is flipped, keypoint i moves to position j.
#
# Symmetric pairs (0-indexed):
#   0(TL)   <-> 2(TR)
#   1(MID_TOP) self
#   3(L_PA_TOP_LINE)    <-> 13(R_PA_TOP_LINE)
#   4(L_GA_TOP_LINE)    <-> 12(R_GA_TOP_LINE)
#   5(L_GA_BOT_LINE)    <-> 11(R_GA_BOT_LINE)
#   6(L_PA_BOT_LINE)    <-> 10(R_PA_BOT_LINE)
#   7(BL)   <-> 9(BR)
#   8(MID_BOT) self
#   14(R_PA_TOP_CORNER) <-> 16(L_PA_TOP_CORNER)
#   15(R_PA_BOT_CORNER) <-> 17(L_PA_BOT_CORNER)
#   18(L_GA_TOP_CORNER) <-> 20(R_GA_TOP_CORNER)
#   19(L_GA_BOT_CORNER) <-> 21(R_GA_BOT_CORNER)
#   22(CIRCLE_TOP) self
#   23(CIRCLE_LEFT) <-> 25(CIRCLE_RIGHT)
#   24(CIRCLE_BOTTOM) self
flip_idx: [
  2, 1, 0,
  13, 12, 11, 10,
  9, 8, 7,
  6, 5, 4, 3,
  16, 17,
  14, 15,
  20, 21,
  18, 19,
  22,
  25, 24, 23
]

nc: 1
names:
  0: football-pitch
